<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>3D Wristband Plate Designer | Silver and Gold Parametric Demo</title>
        <meta name="description" content="Interactively design a curved 3D wristband plate with live typography controls, plate material presets, and shareable URL state.">
        <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
        <meta name="theme-color" content="#050505">
        <meta name="author" content="Astrix">
        <meta name="keywords" content="3D wristband, parametric jewelry, Three.js, product configurator, gold plate, silver plate, typography demo, webgl demo">
        <meta property="og:type" content="website">
        <meta property="og:title" content="3D Wristband Plate Designer">
        <meta property="og:description" content="A live parametric 3D wristband plate demo with front and back text controls, gold and silver finishes, and shareable links.">
        <meta property="og:image" content="https://dummyimage.com/1200x630/050505/f0d9a2&text=3D+Wristband+Plate+Designer">
        <meta property="og:image:alt" content="3D wristband plate designer preview">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="3D Wristband Plate Designer">
        <meta name="twitter:description" content="Live 3D wristband plate demo with editable text, materials, dimensions, and shareable URL parameters.">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        >
        <link rel="stylesheet" href="style.css">
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "3D Wristband Plate Designer",
                "applicationCategory": "DesignApplication",
                "operatingSystem": "Web",
                "description": "A parametric Three.js demo for configuring a curved wristband plate with live front and back text, material presets, and shareable state."
            }
        </script>
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
                }
            }
        </script>
    </head>
    <body>
        <aside id="panel">
            <h1>Plate Params</h1>

            <section class="side-section">
                <h2>Scene Background</h2>

                <label>
                    Preset
                    <select id="bgPreset">
                        <option value="black">Black</option>
                        <option value="midnight">Midnight Blue</option>
                        <option value="charcoal">Charcoal</option>
                        <option value="navy">Deep Navy</option>
                        <option value="warm-dark">Warm Dark</option>
                        <option value="studio-gray">Studio Gray</option>
                        <option value="gradient-dark">Gradient Dark</option>
                        <option value="gradient-warm">Gradient Warm</option>
                        <option value="gradient-cool">Gradient Cool</option>
                        <option value="marble">Marble</option>
                        <option value="grid">Grid</option>
                        <option value="custom">Custom Color</option>
                    </select>
                </label>

                <label id="bgCustomColorLabel" style="display:none">
                    Color
                    <input id="bgColor" type="color" value="#000000">
                </label>
            </section>

            <section class="side-section">
                <h2>Plate</h2>

                <label>
                    Material preset
                    <select id="plateMaterialPreset">
                        <option value="silver">Silver</option>
                        <option value="gold">Gold</option>
                        <option value="custom">Custom</option>
                    </select>
                </label>

                <label>
                    Base color
                    <input id="plateColor" type="color" value="#c6ccd1">
                </label>

                <label>
                    Shininess
                    <input id="plateShininess" type="range" min="0" max="100" step="1" value="66">
                    <output id="plateShininessOut">66</output>
                </label>

                <label>
                    Width
                    <input id="plateWidth" type="range" min="4" max="20" step="0.1" value="10">
                    <output id="plateWidthOut">10</output>
                </label>

                <label>
                    Height
                    <input id="plateHeight" type="range" min="0.4" max="4" step="0.01" value="1">
                    <output id="plateHeightOut">1</output>
                </label>

                <label>
                    Thickness
                    <input id="plateDepth" type="range" min="0.08" max="1.2" step="0.01" value="0.26">
                    <output id="plateDepthOut">0.26</output>
                </label>

                <label>
                    Bend angle (deg)
                    <input id="plateBendAngle" type="range" min="0" max="120" step="0.1" value="16.85">
                    <output id="plateBendAngleOut">16.85</output>
                </label>

                <label>
                    Corner radius
                    <input id="plateCornerRadius" type="range" min="0" max="2" step="0.01" value="0">
                    <output id="plateCornerRadiusOut">0</output>
                </label>

                <label>
                    Rounded corners
                    <select id="plateCornerMode">
                        <option value="none">None</option>
                        <option value="all">All</option>
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                        <option value="top-left">Top Left</option>
                        <option value="top-right">Top Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="bottom-right">Bottom Right</option>
                    </select>
                </label>
            </section>

            <section class="side-section">
                <h2>Band / Chain</h2>

                <div class="toggle-label">
                    Show band
                    <label class="toggle">
                        <input id="bandVisible" type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <label>
                    Type
                    <select id="bandType">
                        <option value="band">Rubber Band</option>
                        <option value="chain">Chain Links</option>
                    </select>
                </label>

                <label>
                    Color
                    <input id="bandColor" type="color" value="#222222">
                </label>

                <label>
                    Thickness
                    <input id="bandThickness" type="range" min="0.05" max="0.8" step="0.01" value="0.22">
                    <output id="bandThicknessOut">0.22</output>
                </label>

                <label>
                    Length (x plate width)
                    <input id="bandLength" type="range" min="1.1" max="2.5" step="0.01" value="1.5">
                    <output id="bandLengthOut">1.5</output>
                </label>

                <label>
                    Metalness
                    <input id="bandMetalness" type="range" min="0" max="1" step="0.01" value="0">
                    <output id="bandMetalnessOut">0</output>
                </label>
            </section>

            <section class="side-section">
                <h2>Front Side</h2>

                <label>
                    Text
                    <input id="frontText" type="text" value="FRONT TEXT" maxlength="40">
                </label>

                <label>
                    Google font
                    <select id="frontFontPreset">
                        <option value="">Custom</option>
                        <option value="Orbitron">Orbitron</option>
                        <option value="Cinzel">Cinzel</option>
                        <option value="Rajdhani">Rajdhani</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Oswald">Oswald</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Bebas Neue">Bebas Neue</option>
                    </select>
                </label>

                <label>
                    Custom font family
                    <input id="frontFontFamily" type="text" value="Orbitron" placeholder="Example: Space Grotesk">
                </label>

                <label>
                    Font size
                    <input id="frontFontSize" type="range" min="32" max="1120" step="1" value="124">
                    <output id="frontFontSizeOut">124</output>
                </label>

                <label>
                    Letter spacing
                    <input id="frontLetterSpacing" type="range" min="-50" max="300" step="0.5" value="2">
                    <output id="frontLetterSpacingOut">2</output>
                </label>

                <label>
                    Font weight
                    <input id="frontFontWeight" type="range" min="100" max="900" step="100" value="700">
                    <output id="frontFontWeightOut">700</output>
                </label>

                <label>
                    Font style
                    <select id="frontFontStyle">
                        <option value="normal">normal</option>
                        <option value="italic">italic</option>
                    </select>
                </label>

                <label>
                    Text transform
                    <select id="frontTextTransform">
                        <option value="none">none</option>
                        <option value="uppercase">uppercase</option>
                        <option value="lowercase">lowercase</option>
                        <option value="capitalize">capitalize</option>
                    </select>
                </label>

                <div class="margin-grid">
                    <h3>Margins (texture px)</h3>

                    <label>
                        Top
                        <input id="frontMarginTop" type="range" min="0" max="180" step="1" value="12">
                        <output id="frontMarginTopOut">12</output>
                    </label>

                    <label>
                        Right
                        <input id="frontMarginRight" type="range" min="0" max="500" step="1" value="120">
                        <output id="frontMarginRightOut">120</output>
                    </label>

                    <label>
                        Bottom
                        <input id="frontMarginBottom" type="range" min="0" max="180" step="1" value="12">
                        <output id="frontMarginBottomOut">12</output>
                    </label>

                    <label>
                        Left
                        <input id="frontMarginLeft" type="range" min="0" max="500" step="1" value="120">
                        <output id="frontMarginLeftOut">120</output>
                    </label>
                </div>
            </section>

            <section class="side-section">
                <h2>Back Side</h2>

                <label>
                    Text
                    <input id="backText" type="text" value="BACK TEXT" maxlength="40">
                </label>

                <label>
                    Google font
                    <select id="backFontPreset">
                        <option value="">Custom</option>
                        <option value="Orbitron">Orbitron</option>
                        <option value="Cinzel">Cinzel</option>
                        <option value="Rajdhani">Rajdhani</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Oswald">Oswald</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Bebas Neue">Bebas Neue</option>
                    </select>
                </label>

                <label>
                    Custom font family
                    <input id="backFontFamily" type="text" value="Cinzel" placeholder="Example: Space Grotesk">
                </label>

                <label>
                    Font size
                    <input id="backFontSize" type="range" min="32" max="1120" step="1" value="98">
                    <output id="backFontSizeOut">98</output>
                </label>

                <label>
                    Letter spacing
                    <input id="backLetterSpacing" type="range" min="-50" max="300" step="0.5" value="1">
                    <output id="backLetterSpacingOut">1</output>
                </label>

                <label>
                    Font weight
                    <input id="backFontWeight" type="range" min="100" max="900" step="100" value="600">
                    <output id="backFontWeightOut">600</output>
                </label>

                <label>
                    Font style
                    <select id="backFontStyle">
                        <option value="normal">normal</option>
                        <option value="italic">italic</option>
                    </select>
                </label>

                <label>
                    Text transform
                    <select id="backTextTransform">
                        <option value="none">none</option>
                        <option value="uppercase">uppercase</option>
                        <option value="lowercase">lowercase</option>
                        <option value="capitalize">capitalize</option>
                    </select>
                </label>

                <div class="margin-grid">
                    <h3>Margins (texture px)</h3>

                    <label>
                        Top
                        <input id="backMarginTop" type="range" min="0" max="180" step="1" value="12">
                        <output id="backMarginTopOut">12</output>
                    </label>

                    <label>
                        Right
                        <input id="backMarginRight" type="range" min="0" max="500" step="1" value="120">
                        <output id="backMarginRightOut">120</output>
                    </label>

                    <label>
                        Bottom
                        <input id="backMarginBottom" type="range" min="0" max="180" step="1" value="12">
                        <output id="backMarginBottomOut">12</output>
                    </label>

                    <label>
                        Left
                        <input id="backMarginLeft" type="range" min="0" max="500" step="1" value="120">
                        <output id="backMarginLeftOut">120</output>
                    </label>
                </div>
            </section>

        </aside>

        <div id="app"></div>

        <div id="exportBar" aria-label="Export controls">
            <button id="exportDepthFront" class="export-btn">Depth Map Front</button>
            <button id="exportDepthBack" class="export-btn">Depth Map Back</button>
            <button id="exportSVGFront" class="export-btn">SVG Vector Front</button>
            <button id="exportSVGBack" class="export-btn">SVG Vector Back</button>
            <button id="exportPDF" class="export-btn">PDF Both Sides</button>
        </div>

        <script type="module" src="script.js"></script>
    </body>
 </html>
